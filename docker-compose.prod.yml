services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-trading_platform}
    ports: []

  redis:
    restart: unless-stopped
    ports: []

  rabbitmq:
    restart: unless-stopped
    ports: []

  backend:
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-trading_platform}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_IGNORE_RESULT: ${CELERY_IGNORE_RESULT:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173}
      ORCHESTRATOR_PARALLEL_WORKERS: ${ORCHESTRATOR_PARALLEL_WORKERS:-6}
      AGENT_SKILLS_BOOTSTRAP_FILE: ${AGENT_SKILLS_BOOTSTRAP_FILE:-/app/config/agent-skills.json}
      AGENT_SKILLS_BOOTSTRAP_MODE: ${AGENT_SKILLS_BOOTSTRAP_MODE:-merge}
      AGENT_SKILLS_BOOTSTRAP_APPLY_ONCE: ${AGENT_SKILLS_BOOTSTRAP_APPLY_ONCE:-true}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-backend
    command: >
      sh -c "mkdir -p /tmp/prometheus-backend && rm -rf /tmp/prometheus-backend/* &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${BACKEND_UVICORN_WORKERS:-4}"
    ports:
      - '${BACKEND_PORT:-8000}:8000'

  worker:
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-trading_platform}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://guest:guest@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_IGNORE_RESULT: ${CELERY_IGNORE_RESULT:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      CELERY_WORKER_MAX_TASKS_PER_CHILD: ${CELERY_WORKER_MAX_TASKS_PER_CHILD:-200}
      ORCHESTRATOR_PARALLEL_WORKERS: ${ORCHESTRATOR_PARALLEL_WORKERS:-6}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus-worker
      PROMETHEUS_WORKER_PORT: ${PROMETHEUS_WORKER_PORT:-9101}

  frontend:
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    command: >
      sh -c "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    ports:
      - '${FRONTEND_PORT:-4173}:4173'

  prometheus:
    profiles: ['monitoring']
    restart: unless-stopped
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'

  grafana:
    profiles: ['monitoring']
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me}
    ports:
      - '${GRAFANA_PORT:-3000}:3000'
